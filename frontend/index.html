<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prospector — Lead Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<style>
/* ============ THEME TOKENS ============ */
.app {
  --mono: "IBM Plex Mono", ui-monospace, monospace;
  --sans: "IBM Plex Sans", system-ui, sans-serif;
  --radius: 12px; --radius-sm: 8px;
  --row-pad: 13px; --cell-font: 13.5px;
  --accent: #6366f1; --accent-2: #818cf8; --accent-bg: rgba(99,102,241,0.15);
}
.app.theme-midnight {
  --bg:#0a0f1c; --bg-2:#0e1525; --bg-3:#141d31; --bg-hover:#16203642;
  --panel:#0e1525; --border:rgba(148,163,184,0.13); --border-2:rgba(148,163,184,0.22);
  --text:#e7ecf5; --text-2:#9aa7bd; --muted:#637088;
  --rose:#fb7185; --rose-bg:rgba(244,63,94,0.13);
  --amber:#fbbf24; --amber-bg:rgba(245,158,11,0.13);
  --emerald:#34d399; --emerald-bg:rgba(16,185,129,0.12);
  --map-region-1:#16233d; --map-region-2:#0c1322;
  --map-region-stroke:rgba(148,163,184,0.18); --map-river:#1f3a5f;
  --map-street:rgba(148,163,184,0.08); --map-pin-stroke:#0a0f1c;
  --shadow:0 10px 34px rgba(0,0,0,0.42); --shadow-sm:0 2px 10px rgba(0,0,0,0.3);
  --scrim:rgba(5,8,16,0.66);
}
.app.theme-daylight {
  --bg:#f3f5f9; --bg-2:#ffffff; --bg-3:#f3f6fb; --bg-hover:#f5f8fd;
  --panel:#ffffff; --border:#e7eaf1; --border-2:#d8dde8;
  --text:#101729; --text-2:#5a6678; --muted:#8b94a5;
  --rose:#e11d48; --rose-bg:rgba(225,29,72,0.085);
  --amber:#d97706; --amber-bg:rgba(217,119,6,0.10);
  --emerald:#059669; --emerald-bg:rgba(5,150,105,0.10);
  --map-region-1:#e9eef7; --map-region-2:#dbe3f1;
  --map-region-stroke:#ccd6e8; --map-river:#bcd0ea;
  --map-street:rgba(90,100,120,0.10); --map-pin-stroke:#ffffff;
  --shadow:0 10px 30px rgba(25,40,75,0.09); --shadow-sm:0 1px 3px rgba(25,40,75,0.07);
  --scrim:rgba(30,41,70,0.30);
}
.app.theme-carbon {
  --radius:5px; --radius-sm:3px;
  --bg:#000000; --bg-2:#0b0b0e; --bg-3:#16161b; --bg-hover:#161620;
  --panel:#0a0a0d; --border:rgba(255,255,255,0.10); --border-2:rgba(255,255,255,0.20);
  --text:#fafafa; --text-2:#a1a1aa; --muted:#6f6f78;
  --rose:#ff5a7a; --rose-bg:rgba(255,90,122,0.13);
  --amber:#ffb020; --amber-bg:rgba(255,176,32,0.12);
  --emerald:#2fd98a; --emerald-bg:rgba(47,217,138,0.12);
  --map-region-1:#141418; --map-region-2:#08080a;
  --map-region-stroke:rgba(255,255,255,0.12); --map-river:#26314a;
  --map-street:rgba(255,255,255,0.05); --map-pin-stroke:#000000;
  --shadow:0 10px 34px rgba(0,0,0,0.65); --shadow-sm:0 2px 10px rgba(0,0,0,0.5);
  --scrim:rgba(0,0,0,0.7);
}
.app.density-compact { --row-pad:8px; --cell-font:12.5px; }

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { background: var(--bg, #0a0f1c); font-family: "IBM Plex Sans", system-ui, sans-serif; }
#root { height: 100vh; }
.mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

/* ============ APP SHELL ============ */
.app {
  display: grid; grid-template-columns: 1fr; height: 100vh;
  background: var(--bg); color: var(--text); font-family: var(--sans);
  font-size: 14px; -webkit-font-smoothing: antialiased; overflow: hidden;
}
.app ::selection { background: var(--accent-bg); }

/* ---------- SIDEBAR ---------- */
.sidebar { display: flex; flex-direction: column; gap: 4px; padding: 18px 14px;
  background: var(--bg-2); border-right: 1px solid var(--border); }
.brand { display: flex; align-items: center; gap: 11px; padding: 6px 8px 18px; }
.brand-mark { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center;
  background: linear-gradient(145deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: var(--shadow-sm); }
.theme-carbon .brand-mark { border-radius: 4px; }
.brand-name { display: flex; flex-direction: column; font-weight: 700; font-size: 15.5px; letter-spacing: -0.01em; line-height: 1.05; }
.brand-sub { font-size: 10.5px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; margin-top: 2px; }
.nav { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
.nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 11px; border: none; border-radius: var(--radius-sm);
  background: transparent; color: var(--text-2); font: inherit; font-weight: 500; font-size: 13.5px; cursor: pointer;
  text-align: left; width: 100%; transition: background .14s, color .14s; }
.nav-item:hover { background: var(--bg-3); color: var(--text); }
.nav-item.active { background: var(--accent-bg); color: var(--accent-2); }
.theme-daylight .nav-item.active { color: var(--accent); }
.nav-item.active svg { color: var(--accent-2); }
.theme-daylight .nav-item.active svg { color: var(--accent); }
.nav-count { margin-left: auto; font-family: var(--mono); font-size: 11px; background: var(--bg-3); color: var(--text-2);
  padding: 1px 7px; border-radius: 20px; }
.nav-item.active .nav-count { background: var(--accent-bg); color: var(--accent-2); }
.nav-spacer { flex: 1; }
.nav-item.subtle { color: var(--muted); }
.sidebar-card { background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; margin-bottom: 8px; }
.sc-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; color: var(--text-2); }
.sc-row strong { font-family: var(--mono); font-size: 18px; color: var(--text); }
.sc-bar { display: flex; height: 6px; border-radius: 4px; overflow: hidden; margin: 9px 0 7px; background: var(--bg); }
.sc-bar div { height: 100%; }
.sc-legend { font-size: 11px; color: var(--muted); }

/* ---------- MAIN ---------- */
.main { display: flex; flex-direction: column; min-width: 0; height: 100vh; overflow: hidden; }

/* topbar */
.topbar { display: flex; align-items: center; gap: 18px; padding: 0 22px; height: 60px;
  border-bottom: 1px solid var(--border); background: var(--bg-2); flex-shrink: 0; }
.tb-area { display: flex; flex-direction: column; gap: 1px; }
.tb-area-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; }
.tb-area-pick { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text);
  font: inherit; font-weight: 600; font-size: 14px; cursor: pointer; padding: 0; }
.tb-area-pick svg { color: var(--muted); }
.tb-search { flex: 1; max-width: 520px; display: flex; align-items: center; gap: 9px; padding: 0 13px; height: 38px;
  background: var(--bg-3); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); }
.theme-carbon .tb-search { border-radius: 4px; }
.tb-search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.tb-search input { flex: 1; background: none; border: none; outline: none; color: var(--text); font: inherit; font-size: 13.5px; }
.tb-search input::placeholder { color: var(--muted); }
.tb-clear { background: var(--bg); border: none; color: var(--text-2); width: 20px; height: 20px; border-radius: 5px; cursor: pointer; display: grid; place-items: center; }
.tb-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.icon-btn { position: relative; width: 38px; height: 38px; display: grid; place-items: center; border-radius: 9px;
  border: 1px solid var(--border); background: var(--bg-3); color: var(--text-2); cursor: pointer; transition: .14s; }
.icon-btn:hover { color: var(--text); border-color: var(--border-2); }
.icon-btn.ghost { border-color: transparent; background: transparent; }
.icon-btn.ghost:hover { background: var(--bg-3); }
.theme-carbon .icon-btn { border-radius: 4px; }
.bell-dot { position: absolute; top: 8px; right: 9px; width: 7px; height: 7px; border-radius: 50%; background: var(--rose); border: 2px solid var(--bg-2); }
.btn-primary { display: inline-flex; align-items: center; gap: 8px; height: 38px; padding: 0 16px; border-radius: 10px;
  border: none; background: var(--accent); color: #fff; font: inherit; font-weight: 600; font-size: 13.5px; cursor: pointer;
  box-shadow: var(--shadow-sm); transition: filter .14s, transform .06s; }
.btn-primary:hover { filter: brightness(1.08); }
.btn-primary:active { transform: translateY(1px); }
.theme-carbon .btn-primary { border-radius: 4px; }
.btn-primary.wide { width: 100%; justify-content: center; }
.btn-ghost { height: 38px; padding: 0 16px; border-radius: 10px; border: 1px solid var(--border-2); background: transparent;
  color: var(--text-2); font: inherit; font-weight: 600; font-size: 13.5px; cursor: pointer; }
.btn-ghost:hover { color: var(--text); }

/* content */
.content { flex: 1; overflow-y: auto; padding: 22px 24px 40px; }
.content::-webkit-scrollbar { width: 11px; }
.content::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 8px; border: 3px solid var(--bg); }
.content-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; }
.content-head h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.content-sub { margin: 5px 0 0; font-size: 13px; color: var(--text-2); }
.content-sub strong { color: var(--text); font-weight: 600; }

/* ---------- STATS ---------- */
.stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 13px; margin-bottom: 18px; }
.stat-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px 16px 12px; position: relative; overflow: hidden; }
.density-compact .stat-card { padding: 12px 13px 9px; }
.stat-top { display: flex; justify-content: space-between; align-items: center; }
.stat-label { font-size: 11.5px; color: var(--text-2); font-weight: 500; }
.stat-ico { opacity: 0.9; }
.stat-value { font-family: var(--mono); font-size: 30px; font-weight: 600; letter-spacing: -0.02em; margin: 6px 0 1px; line-height: 1; }
.density-compact .stat-value { font-size: 25px; }
.stat-sub { font-size: 11.5px; color: var(--muted); }
.spark { display: block; margin-top: 8px; opacity: 0.9; }
.density-compact .spark { display: none; }
.theme-carbon .stat-label { font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10.5px; }

/* ---------- WORKSPACE ---------- */
.workspace { display: grid; grid-template-columns: minmax(380px, 460px) 1fr; gap: 16px; align-items: start; }
@media (max-width: 1180px){ .workspace { grid-template-columns: 1fr; } }

/* map */
.map-col { display: flex; flex-direction: column; gap: 14px; }
.map { position: relative; height: 360px; border-radius: var(--radius); overflow: hidden;
  border: 1px solid var(--border); background: var(--map-region-2); box-shadow: var(--shadow-sm); }
.map-leaflet { position: absolute; inset: 0; background: var(--map-region-2); z-index: 0; }
.map-leaflet .leaflet-control-attribution { background: var(--bg-2); color: var(--muted); font-size: 9.5px; border-radius: 6px 0 0 0; }
.map-leaflet .leaflet-control-attribution a { color: var(--text-2); }
/* status pins (scale the inner span — never the Leaflet-positioned container) */
.lpin { background: transparent !important; border: none !important; }
.lpin .lpin-inner { display: block; width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
  box-shadow: 0 0 0 2px var(--map-pin-stroke), 0 1px 4px rgba(0,0,0,0.4); transition: transform .13s ease; }
.lpin-none   .lpin-inner { background: var(--rose); }
.lpin-outdated .lpin-inner { background: var(--amber); }
.lpin-modern .lpin-inner { background: var(--emerald); }
.lpin.hov .lpin-inner { transform: scale(1.22); }
.lpin.sel .lpin-inner { transform: scale(1.42); box-shadow: 0 0 0 3px var(--map-pin-stroke), 0 0 0 7px var(--accent-bg), 0 2px 6px rgba(0,0,0,0.4); }
.lpin-none .lpin-inner::after { content: ""; position: absolute; left: 50%; top: 50%; width: 16px; height: 16px;
  margin: -8px 0 0 -8px; border-radius: 50%; border: 1.5px solid var(--rose); animation: pinpulse 2.3s ease-out infinite; pointer-events: none; }
@keyframes pinpulse { 0%{ transform: scale(1); opacity:.6; } 70%,100%{ transform: scale(2.6); opacity:0; } }
.lpin.drop .lpin-inner { animation: pindrop .6s cubic-bezier(.2,1.3,.4,1); }
@keyframes pindrop { 0%{ transform: translateY(-18px) scale(0); opacity:0; } 60%{ opacity:1; } 100%{ transform: none; } }
/* tooltip */
.leaflet-tooltip.lmap-tip { background: var(--bg-3); border: 1px solid var(--border-2); color: var(--text);
  border-radius: 9px; padding: 7px 11px; box-shadow: var(--shadow); font-family: var(--sans); font-size: 12.5px; font-weight: 600; }
.leaflet-tooltip.lmap-tip .lt-meta { display: block; font-size: 11px; font-weight: 400; color: var(--text-2); margin-top: 3px; }
.leaflet-tooltip.lmap-tip::before { border-top-color: var(--border-2); }
/* scan ripple over the live map */
.map-scan-overlay { position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; z-index: 400; }
.scan-ripple { position: absolute; width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent); opacity: 0; animation: ripple 2.2s ease-out infinite; }
.scan-ripple.d2 { animation-delay: 1.1s; }
@keyframes ripple { 0%{ transform: scale(.3); opacity:.55; } 100%{ transform: scale(7); opacity:0; } }
.map-head { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; z-index: 600; pointer-events: none; }
.map-head > * { pointer-events: auto; }
.map-area { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-2); border: 1px solid var(--border-2);
  color: var(--text); font-size: 12px; font-weight: 600; padding: 6px 11px; border-radius: 8px; box-shadow: var(--shadow-sm); }
.map-area svg { color: var(--accent-2); }
.theme-daylight .map-area svg { color: var(--accent); }
.map-zoom { display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-2); box-shadow: var(--shadow-sm); }
.map-zoom button { width: 30px; height: 28px; border: none; background: var(--bg-2); color: var(--text); font-size: 16px; cursor: pointer; display: grid; place-items: center; }
.map-zoom button:first-child { border-bottom: 1px solid var(--border); }
.map-zoom button:hover { background: var(--bg-3); }
.map-legend { position: absolute; left: 12px; bottom: 12px; display: flex; flex-direction: column; gap: 5px;
  background: var(--bg-2); border: 1px solid var(--border); border-radius: 9px; padding: 9px 11px; box-shadow: var(--shadow-sm); z-index: 600; }
.leg-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text-2); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
.map-scanning { position: absolute; right: 12px; bottom: 24px; display: flex; align-items: center; gap: 7px;
  background: var(--bg-2); border: 1px solid var(--accent); color: var(--accent); font-size: 11.5px; font-weight: 600;
  padding: 7px 11px; border-radius: 8px; box-shadow: var(--shadow-sm); z-index: 600; }
.theme-daylight .map-scanning { color: var(--accent); }
.scan-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: blink 1s infinite; }
@keyframes blink { 50%{ opacity:.3; } }

/* area list */
.area-list { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; }
.al-head { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; padding: 9px 10px 7px; }
.al-item { display: flex; flex-direction: column; gap: 7px; width: 100%; text-align: left; background: transparent; border: none;
  border-radius: var(--radius-sm); padding: 10px; cursor: pointer; transition: background .14s; }
.al-item:hover { background: var(--bg-3); }
.al-item.active { background: var(--accent-bg); }
.al-name { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; color: var(--text); }
.al-name svg { color: var(--muted); }
.al-item.active .al-name svg { color: var(--accent-2); }
.al-when { margin-left: auto; font-size: 10.5px; color: var(--muted); font-weight: 500; }
.al-meta { display: flex; align-items: center; gap: 10px; }
.al-leads { font-size: 11px; color: var(--text-2); font-family: var(--mono); white-space: nowrap; }
.al-cov { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.al-cov div { height: 100%; background: var(--accent); border-radius: 3px; }

/* ---------- TABLE ---------- */
.table-col { display: flex; flex-direction: column; min-width: 0; background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; }
.filterbar { display: flex; align-items: center; gap: 12px; padding: 11px 13px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.chips { display: flex; gap: 6px; }
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 11px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg-3); color: var(--text-2); font: inherit; font-size: 12.5px; font-weight: 500; cursor: pointer; transition: .12s; }
.theme-carbon .chip { border-radius: 4px; }
.chip:hover { color: var(--text); border-color: var(--border-2); }
.chip.active { background: var(--accent-bg); color: var(--accent-2); border-color: transparent; }
.theme-daylight .chip.active { color: var(--accent); }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; }
.chip-n { font-family: var(--mono); font-size: 11px; opacity: 0.7; }
.fb-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.result-count { font-size: 11.5px; color: var(--muted); font-family: var(--mono); }
.sort { display: flex; align-items: center; gap: 6px; color: var(--text-2); }
.sort select { background: var(--bg-3); border: 1px solid var(--border); color: var(--text); font: inherit; font-size: 12.5px;
  border-radius: 8px; padding: 6px 8px; cursor: pointer; }
.theme-carbon .sort select { border-radius: 4px; }

.table-wrap { overflow-x: auto; overflow-y: visible; }
.lead-table { width: 100%; border-collapse: collapse; font-size: var(--cell-font); }
.lead-table thead th { position: sticky; top: 0; background: var(--bg-2); text-align: left; padding: 11px 14px;
  font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600;
  border-bottom: 1px solid var(--border); white-space: nowrap; z-index: 1; }
.theme-carbon .lead-table thead th { font-family: var(--mono); }
.lead-table th.c-num, .lead-table td.c-num { text-align: right; }
.lead-table tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.lead-table tbody tr:last-child { border-bottom: none; }
.lead-table tbody tr:hover, .lead-table tbody tr.hov { background: var(--bg-hover); }
.lead-table tbody tr.sel { background: var(--accent-bg); }
.lead-table td { padding: var(--row-pad) 14px; color: var(--text-2); vertical-align: middle; }
.cell-name { display: flex; align-items: center; gap: 11px; }
.avatar { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; font-size: 11.5px; font-weight: 700; flex-shrink: 0; }
.theme-carbon .avatar { border-radius: 4px; }
.density-compact .avatar { width: 27px; height: 27px; font-size: 10.5px; }
.cn-text { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.cn-title { color: var(--text); font-weight: 600; font-size: var(--cell-font); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.cn-contacted { color: var(--emerald); display: inline-flex; }
.cn-addr { font-size: 11.5px; color: var(--muted); white-space: nowrap; }
.badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px; border-radius: 20px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; }
.cat-tag { font-size: 12px; color: var(--text-2); }
.dash { color: var(--muted); }
.rating { display: inline-flex; align-items: center; gap: 4px; color: var(--text); font-weight: 500; }
.phone { font-size: 12px; color: var(--text-2); white-space: nowrap; }
.socs { display: flex; gap: 5px; }
.soc { font-size: 10px; font-weight: 700; width: 24px; height: 20px; display: grid; place-items: center; border-radius: 5px;
  background: var(--bg-3); color: var(--muted); letter-spacing: 0.02em; }
.soc.on { background: var(--accent-bg); color: var(--accent-2); }
.theme-daylight .soc.on { color: var(--accent); }
.c-score { width: 130px; }
.score { display: flex; align-items: center; gap: 9px; }
.score-bar { flex: 1; height: 6px; background: var(--bg-3); border-radius: 4px; overflow: hidden; min-width: 54px; }
.score-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.score-num { font-family: var(--mono); font-size: 12.5px; font-weight: 600; width: 22px; text-align: right; }
.c-act { width: 30px; color: var(--muted); }
.c-act svg { opacity: 0.5; }
tr:hover .c-act svg { opacity: 1; color: var(--text-2); }
.empty { padding: 50px; text-align: center; color: var(--muted); font-size: 13.5px; }

/* ---------- SLIDEOVER ---------- */
.slideover-scrim { position: fixed; inset: 0; background: var(--scrim); z-index: 40; animation: fade .2s; }
@keyframes fade { from{ opacity:0; } }
.slideover { position: fixed; top: 0; right: 0; bottom: 0; width: 392px; background: var(--bg-2); border-left: 1px solid var(--border);
  z-index: 41; display: flex; flex-direction: column; box-shadow: var(--shadow); animation: slidein .26s cubic-bezier(.2,.8,.3,1); }
@keyframes slidein { from{ transform: translateX(30px); opacity:0; } }
.so-head { display: flex; justify-content: flex-end; padding: 14px 14px 0; }
.so-body { flex: 1; overflow-y: auto; padding: 4px 22px 22px; }
.so-top { display: flex; gap: 13px; align-items: center; margin-bottom: 18px; }
.so-top .avatar { width: 46px; height: 46px; font-size: 15px; }
.so-top h2 { margin: 0; font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
.so-cat { font-size: 12.5px; color: var(--text-2); margin-top: 3px; }
.so-status-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.so-score { display: flex; flex-direction: column; align-items: flex-end; }
.so-score span { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; }
.so-score strong { font-family: var(--mono); font-size: 24px; line-height: 1; }
.so-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin: 18px 0; }
.so-stat { background: var(--bg-2); padding: 13px 14px; display: flex; flex-direction: column; gap: 5px; }
.so-stat span { font-size: 11px; color: var(--muted); }
.so-stat strong { font-size: 15px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
.so-stat strong.sm { font-size: 13px; }
.so-section { margin-bottom: 18px; }
.so-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; margin-bottom: 9px; }
.so-web { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.web-none, .web-has { display: flex; gap: 12px; align-items: flex-start; }
.web-none { color: var(--rose); } .web-has { color: var(--amber); }
.web-none div, .web-has div { display: flex; flex-direction: column; gap: 3px; }
.web-none strong, .web-has strong { color: var(--text); font-size: 13.5px; }
.web-none span, .web-has span { color: var(--text-2); font-size: 12px; font-weight: 400; }
.so-socials { display: flex; gap: 8px; flex-wrap: wrap; }
.soc-pill { font-size: 12px; padding: 7px 12px; border-radius: 8px; background: var(--bg-3); color: var(--muted); border: 1px solid var(--border); }
.soc-pill.on { background: var(--accent-bg); color: var(--accent-2); border-color: transparent; font-weight: 500; }
.theme-daylight .soc-pill.on { color: var(--accent); }
.so-foot { display: flex; gap: 10px; padding: 16px 22px; border-top: 1px solid var(--border); }
.btn-contact { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 16px; border-radius: 10px;
  border: 1px solid var(--border-2); background: var(--bg-3); color: var(--text); font: inherit; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; }
.btn-contact.done { background: var(--emerald-bg); color: var(--emerald); border-color: transparent; }
.theme-carbon .btn-contact { border-radius: 4px; }

/* ---------- MODAL ---------- */
.modal-scrim { position: fixed; inset: 0; background: var(--scrim); z-index: 50; display: grid; place-items: center; animation: fade .2s; padding: 20px; }
.modal { width: 480px; max-width: 100%; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 16px;
  box-shadow: var(--shadow); overflow: hidden; animation: pop .26s cubic-bezier(.2,.9,.3,1); }
.theme-carbon .modal { border-radius: 6px; }
@keyframes pop { from{ transform: scale(.96) translateY(8px); opacity:0; } }
.modal-head { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 20px 0; }
.modal-head h3 { margin: 0; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 9px; }
.modal-head h3 svg { color: var(--accent-2); }
.theme-daylight .modal-head h3 svg { color: var(--accent); }
.modal-head p { margin: 5px 0 0; font-size: 12.5px; color: var(--text-2); }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 17px; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field > span { font-size: 12px; font-weight: 600; color: var(--text-2); display: flex; justify-content: space-between; }
.field > span strong { color: var(--accent-2); }
.theme-daylight .field > span strong { color: var(--accent); }
.field-input { display: flex; align-items: center; gap: 9px; padding: 0 12px; height: 42px; background: var(--bg-3);
  border: 1px solid var(--border); border-radius: 10px; color: var(--muted); }
.field-input:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.field-input input { flex: 1; background: none; border: none; outline: none; color: var(--text); font: inherit; font-size: 14px; }
.range { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 4px; background: var(--bg-3); outline: none; }
.range::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 3px solid var(--bg-2); box-shadow: var(--shadow-sm); }
.cat-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.cat-chip { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg-3); color: var(--text-2); font: inherit; font-size: 12.5px; font-weight: 500; cursor: pointer; }
.cat-chip.on { background: var(--accent-bg); color: var(--accent-2); border-color: transparent; }
.theme-daylight .cat-chip.on { color: var(--accent); }
.scan-est { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); background: var(--bg-3);
  border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; }
.scan-est svg { color: var(--accent-2); } .theme-daylight .scan-est svg { color: var(--accent); }
.scan-est strong { color: var(--text); }
.modal-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 20px; border-top: 1px solid var(--border); }

/* scan running */
.scan-run { padding: 34px 28px 26px; display: flex; flex-direction: column; align-items: center; text-align: center; }
.scan-radar { position: relative; width: 150px; height: 150px; display: grid; place-items: center; margin-bottom: 6px; }
.radar-ring { position: absolute; border: 1.5px solid var(--accent); border-radius: 50%; opacity: 0; }
.radar-ring { width: 100%; height: 100%; animation: ring 2.4s ease-out infinite; }
.radar-ring.d2 { animation-delay: .8s; } .radar-ring.d3 { animation-delay: 1.6s; }
@keyframes ring { 0%{ transform: scale(.25); opacity:.6; } 100%{ transform: scale(1); opacity:0; } }
.radar-core { width: 60px; height: 60px; border-radius: 50%; background: var(--accent-bg); color: var(--accent-2); display: grid; place-items: center; z-index: 2; }
.theme-daylight .radar-core { color: var(--accent); }
.radar-line { position: absolute; width: 50%; height: 2px; left: 50%; top: 50%; transform-origin: left center;
  background: linear-gradient(90deg, var(--accent), transparent); animation: sweep 2s linear infinite; }
@keyframes sweep { to{ transform: rotate(360deg); } }
.scan-found { font-family: var(--mono); font-size: 46px; font-weight: 600; line-height: 1; margin-top: 8px; color: var(--accent-2); }
.theme-daylight .scan-found { color: var(--accent); }
.scan-found-label { font-size: 12.5px; color: var(--text-2); margin-top: 4px; }
.scan-prog { width: 100%; height: 7px; background: var(--bg-3); border-radius: 4px; overflow: hidden; margin: 22px 0 11px; }
.scan-prog-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s ease; }
.scan-status { font-size: 12.5px; color: var(--text-2); margin-bottom: 16px; }
.scan-run .btn-primary { margin-top: 4px; }
</style>
